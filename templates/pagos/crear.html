{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

    <h2 class="text-success mb-4">💰 Nuevo Pago</h2>

    <!-- ✅ MENSAJE DE ERROR -->
    {% if error %}
    <div class="alert alert-danger">
        {{ error }}
    </div>
    {% endif %}

    <form method="post" class="card p-4 shadow">

        <!-- CLIENTE -->
        <div class="mb-3">
            <label class="form-label">Cliente</label>
            <select name="cliente_id" class="form-control" required>
                <option value="">-- Seleccione un cliente --</option>
                {% for c in clientes %}
                <option value="{{ c['id'] }}">
                    {{ c['nombre'] }}
                </option>
                {% endfor %}
            </select>
        </div>

        <!-- VALOR -->
        <div class="mb-3">
            <label class="form-label">Valor</label>
            <input type="number"
                   step="0.01"
                   min="0.01"
                   name="valor"
                   class="form-control"
                   placeholder="Ej: 10.50"
                   required>
        </div>

        <!-- OBSERVACIONES -->
        <div class="mb-3">
            <label class="form-label">Observaciones</label>
            <input type="text"
                   name="observaciones"
                   class="form-control"
                   placeholder="Opcional">
        </div>

        <!-- BOTONES -->
        <div class="d-flex gap-2">
            <button class="btn btn-success">
                💾 Guardar Pago
            </button>

            <a href="{{ url_for('pagos.index') }}" class="btn btn-secondary">
                🔙 Volver
            </a>
        </div>

    </form>

</div>

{% endblock %}
