<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Producto - Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0">

                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">📦 Agregar Nuevo Producto</h4>
                </div>

                <div class="card-body p-4">
                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">Descripción:</label>
                            <input type="text" name="descripcion" class="form-control" required>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Precio ($):</label>
                                <input type="number" step="0.01" name="precio" class="form-control" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Stock Inicial:</label>
                                <input type="number" name="stock_actual" class="form-control" required>
                            </div>
                        </div>

                        <div class="d-grid gap-2 mt-3">
                            <button type="submit" class="btn btn-success btn-lg">
                                💾 Guardar Producto
                            </button>

                            <!-- ✅ MEJOR -->
                            <a href="{{ url_for('productos.index') }}" class="btn btn-outline-secondary">
                                🔙 Cancelar
                            </a>
                        </div>

                    </form>

                </div>

            </div>
        </div>
    </div>
</div>

</body>
</html>
