{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

    <h2 class="mb-3">👥 Clientes</h2>

    <input class="form-control mb-3" id="buscador" placeholder="Buscar cliente...">

    <a href="{{ url_for('clientes.crear') }}" class="btn btn-primary mb-3">
        ➕ Nuevo Cliente
    </a>

    <table class="table table-striped shadow" id="tabla">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
        {% for c in clientes %}
        <tr>
            <td>{{ c["id"] }}</td>
            <td>{{ c["nombre"] }}</td>
            <td>{{ c["email"] }}</td>
            <td>
                <a href="{{ url_for('clientes.editar', id=c['id']) }}"
                   class="btn btn-warning btn-sm">Editar</a>

                <a href="{{ url_for('clientes.eliminar', id=c['id']) }}"
                   class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>

</div>

<script>
document.getElementById("buscador").addEventListener("keyup", function() {
    let filtro = this.value.toLowerCase();
    let filas = document.querySelectorAll("#tabla tbody tr");

    filas.forEach(fila => {
        let texto = fila.innerText.toLowerCase();
        fila.style.display = texto.includes(filtro) ? "" : "none";
    });
});
</script>

{% endblock %}
