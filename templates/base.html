<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Inventario</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark navbar-expand-lg shadow">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">📦 Inventario</a>

        <!-- BOTÓN RESPONSIVE -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- MENÚ -->
        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/clientes">👤 Clientes</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/productos">📦 Productos</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/ventas">🛒 Ventas</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/pagos">💰 Pagos</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-danger" href="/logout">🚪 Salir</a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<!-- JS Bootstrap (IMPORTANTE para menú responsive) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
